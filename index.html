<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Starlink Website</title>
	
    <style>
	
	        body {
            margin: 0; /* Remove default margin */
            height: 100vh; /* Full viewport height */
            background-image: url('background.jpg'); /* Path to your image */
            background-size: cover; /* Scale image to cover entire area */
            background-position: center; /* Center the image */
            background-repeat: no-repeat; /* Prevent tiling */
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
		</style>
		
		<style>
        /* Simple styling for the button */
        .launch-btn {
            background-color: #4CAF50; /* Green */
            border: none;
            color: white;
            padding: 12px 24px;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        .launch-btn:hover {
            background-color: #45a049;
        }
    </style>
	
    <style>
        /* Reset some default browser styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background: #333;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
        }

        nav {
            background: #444;
        }

        nav ul {
            display: flex;
            list-style: none;
            justify-content: center;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            padding: 8px 12px;
            transition: background 0.3s;
        }

        nav ul li a:hover {
            background: #666;
            border-radius: 4px;
        }

        main {
            max-width: 1100px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #333;
            color: #fff;
            margin-top: 20px;
        }

        /* Responsive design for small screens */
        @media (max-width: 600px) {
            nav ul {
                flex-direction: column;
            }
            nav ul li {
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Starlink Website</h1>
        <p>A simple responsive HTML & CSS design</p>
    </header>

<br>
<br>
 <!-- Button that launches a webpage -->
    <button class="launch-btn" onclick="window.location.href='https://github.com/dmarlowe69';">
        GitHub.com/dmarlowe69
    </button>
<br>
<br>
    <footer>
        <p>&copy; 2026 My Simple Website. All rights reserved.</p>
    </footer>

</body>
</html>
